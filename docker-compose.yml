services:

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devotional
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://app:password@db:5432/devotional"
      SMTP_HOST: "smtp-relay.brevo.com"
      SMTP_PORT: "587"
      SMTP_USER: "${BREVO_SMTP_LOGIN}"
      SMTP_PASS: "${BREVO_SMTP_KEY}"
      SMTP_FROM: "${BREVO_FROM_EMAIL}"
      SMTP_SECURE: "false"
      EMAIL_CHECK_INTERVAL_MS: "60000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data: