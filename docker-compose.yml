services:
  api:
    build: ./api
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://devotional_app:devotional_local_pw@shared-postgres:5432/devotional_local"
      SMTP_HOST: "smtp-relay.brevo.com"
      SMTP_PORT: "587"
      SMTP_USER: "${BREVO_SMTP_LOGIN}"
      SMTP_PASS: "${BREVO_SMTP_KEY}"
      SMTP_FROM: "${BREVO_FROM_EMAIL}"
      SMTP_SECURE: "false"
      EMAIL_CHECK_INTERVAL_MS: "60000"
    networks:
      - default
      - shared_net

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - default

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - default

volumes:
  caddy_data:
  caddy_config:


networks:
  shared_net:
    external: true
